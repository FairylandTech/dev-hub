<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>表单标签</title>
</head>
<body>
<form action="http://127.0.0.1:8000/api/example/v1/example/submit/" method="post" name="表单域" enctype="multipart/form-data">
    <!-- input 标签元素传入后台的信息 (name 表示字段, value 表示自动的值)-->
    <!-- label 标签 -->

    <!-- text 文本输入框 maxlength: 最大长度 -->
    <label for="username">用户名: </label> <input type="text" id="username" name="username" maxlength="255">
    <br>
    <!-- password 密码输入框 -->
    <label for="password">密码: </label> <input type="password" id="password" name="password">
    <br>
    <!-- radio 单选框, name属性必须要一样, checked: 默认勾选 -->
    性别:
    <label for="male">男</label> <input type="radio" id="male" name="gender" value="male" checked>
    <label for="female">女</label> <input type="radio" id="female" name="gender" value="female">
    <br>
    <!-- checkbox 多选框 -->
    爱好:
    <label for="eat">吃饭</label> <input type="checkbox" id="eat" name="hobby" value="eat">
    <label for="sleep">睡觉</label> <input type="checkbox" id="sleep" name="hobby" value="sleep">
    <br>
    <!-- file 文件 -->
    <label for="file">图片: </label> <input type="file" id="file" name="file">
    <br>
    <!-- select 下拉 -->
    <label for="area">省份: </label>
    <select name="area" id="area">
        <option value="山东">山东</option>
        <option value="陕西">陕西</option>
    </select>
    <br>
    <!-- text -->
    <label for="textarea">介绍: </label>
    <textarea name="textarea" id="textarea" cols="50" rows="5"></textarea>

    <input type="submit" value="提交"> <input type="reset" value="重置">
</form>
</body>
</html>
