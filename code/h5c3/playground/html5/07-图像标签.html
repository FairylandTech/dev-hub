<html lang="zh-CN">
<head>

    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>图像标签</title>
</head>
<body>
<h4> 图像标签的使用:</h4>
<img src="assets/images/Kasa.png"/>

<h4> alt 替换文本 图像显示不出来的时候用文字替换:</h4>
<img src="assets/images/Kasa1.png" alt="kasa"/>

<h4> title 提示文本 鼠标放到图像上,提示的文字:</h4>
<img src="assets/images/Kasa.png" title="卡莎" alt="kasa"/>

<h4> width 给图像设定宽度:</h4>
<img src="assets/images/Kasa.png" alt="kasa" title="卡莎" width="500"/>

<h4> height 给图像设定高度:</h4>
<img src="assets/images/Kasa.png" alt="kasa" title="卡莎" height="100"/>

<h4> border 给图像设定边框:</h4>
<img src="assets/images/Kasa.png" alt="kasa" title="卡莎" width="500" border="15"/>
</body>
</html>
